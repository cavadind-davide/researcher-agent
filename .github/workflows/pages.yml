name: Build & Deploy Pages

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"   # jeden Montag 06:00 UTC

permissions:
  contents: write   # damit der Job die aktualisierte SQLite zurueckschreiben kann
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Setup Node.js (fuer Brave-Search-MCP via npx)
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-lock.txt
          pip install -e . --no-deps

      - name: Refresh research (re-recherchiert nur veraenderte Topics)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
        run: researcher refresh

      - name: Commit aktualisierte DB (falls geaendert)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/researcher.sqlite
          if git diff --staged --quiet; then
            echo "Keine DB-Aenderungen."
          else
            git commit -m "chore: aktualisierte Quellen-Frische [skip ci]"
            git push
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages-Artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
